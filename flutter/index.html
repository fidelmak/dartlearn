<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Flutter Forge — Master Flutter by Building</title>
<link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;400;500;600;700&family=Syne:wght@400;600;700;800&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0c10;
  --surface: #11151c;
  --surface2: #181e28;
  --border: #1f2a3a;
  --border2: #2a3a50;
  --flutter-blue: #40C4FF;
  --flutter-deepblue: #0277BD;
  --flutter-green: #69F0AE;
  --flutter-cyan: #00E5FF;
  --flutter-orange: #FFAB40;
  --flutter-red: #EF5350;
  --flutter-yellow: #FFEA00;
  --success: #10b981;
  --error: #ef4444;
  --text: #e2e8f0;
  --text2: #94a3b8;
  --code-bg: #03050a;
  --glow-flutter: 0 0 20px rgba(64,196,255,0.4);
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: var(--bg);
  font-family: 'Syne', sans-serif;
  color: var(--text);
  height: 100vh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  position: relative;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background: radial-gradient(circle at 80% 20%, rgba(64,196,255,0.06) 0%, transparent 60%);
  pointer-events: none;
}

header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 28px;
  border-bottom: 1px solid var(--border);
  background: rgba(10,12,16,0.96);
  backdrop-filter: blur(14px);
  z-index: 20;
  flex-shrink: 0;
  gap: 20px;
}

.logo-wrap { display: flex; align-items: center; gap: 12px; }
.logo-icon {
  width: 40px; height: 40px;
  background: linear-gradient(135deg, var(--flutter-blue), var(--flutter-deepblue));
  border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  font-weight: 800; font-size: 1.2rem;
  box-shadow: var(--glow-flutter);
}
.logo-text { font-weight: 800; font-size: 1.2rem; letter-spacing: -0.02em; }
.logo-text .flutter { color: var(--flutter-blue); }
.logo-text .forge { color: var(--text); }
.logo-sub { font-size: 0.55rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--text2); }

.prog-row { display: flex; justify-content: space-between; font-size: 0.6rem; font-weight: 600; text-transform: uppercase; color: var(--text2); margin-bottom: 4px; }
.prog-track { height: 3px; background: var(--border); border-radius: 99px; overflow: hidden; }
.prog-fill { height: 100%; background: linear-gradient(90deg, var(--flutter-blue), var(--flutter-green)); transition: width 0.5s ease; }

.hud { display: flex; gap: 10px; }
.hud-chip {
  font-family: 'Fira Code', monospace; font-size: 0.7rem;
  padding: 4px 12px; border-radius: 8px; border: 1px solid var(--border2);
  background: var(--surface); display: flex; align-items: center; gap: 6px;
}
.hud-chip.xp { border-color: rgba(64,196,255,0.5); color: var(--flutter-blue); }
.hud-chip.flame { border-color: rgba(255,171,64,0.4); color: var(--flutter-orange); }
.hud-chip.lvl { border-color: rgba(105,240,174,0.4); color: var(--flutter-green); }

.chapter-rail {
  display: flex; padding: 0 28px; border-bottom: 1px solid var(--border);
  background: rgba(10,12,16,0.9); flex-shrink: 0; overflow-x: auto; gap: 0;
}
.ch-tab {
  padding: 8px 18px; font-size: 0.7rem; font-weight: 700; text-transform: uppercase;
  color: var(--text2); cursor: pointer; border-bottom: 2px solid transparent;
  transition: 0.2s; white-space: nowrap; display: flex; align-items: center; gap: 8px;
}
.ch-tab:hover { color: var(--text); }
.ch-tab.active { color: var(--flutter-cyan); border-bottom-color: var(--flutter-cyan); }
.ch-tab.done { color: var(--success); }
.ch-tab.locked { opacity: 0.3; cursor: not-allowed; pointer-events: none; }

.arena { display: flex; flex: 1; overflow: hidden; position: relative; z-index: 1; }

.lesson-pane {
  width: 42%; border-right: 1px solid var(--border);
  background: var(--surface); display: flex; flex-direction: column;
  overflow: hidden; flex-shrink: 0;
}
.lesson-head {
  padding: 14px 20px; border-bottom: 1px solid var(--border);
  background: var(--surface2); flex-shrink: 0;
}
.lesson-meta { display: flex; gap: 8px; margin-bottom: 8px; flex-wrap: wrap; }
.badge-step { font-family: 'Fira Code', monospace; font-size: 0.55rem; padding: 2px 8px; border-radius: 4px; background: rgba(64,196,255,0.2); color: var(--flutter-blue); border: 1px solid rgba(64,196,255,0.4); }
.badge-topic { font-family: 'Fira Code', monospace; font-size: 0.55rem; padding: 2px 8px; border-radius: 4px; background: rgba(105,240,174,0.1); color: var(--flutter-green); }
.lesson-title { font-weight: 800; font-size: 1rem; letter-spacing: -0.02em; }
.lesson-body { flex: 1; overflow-y: auto; padding: 20px; scrollbar-width: thin; }

.block { margin-bottom: 20px; animation: fadeUp 0.35s ease both; }
@keyframes fadeUp { from { opacity:0; transform: translateY(8px); } to { opacity:1; transform: translateY(0); } }
.block-label { font-size: 0.6rem; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 8px; display: flex; gap: 6px; align-items: center; }
.concept-text { font-size: 0.85rem; line-height: 1.7; color: #b9c7d9; }
.concept-text code, .task-text code { font-family: 'Fira Code', monospace; background: var(--code-bg); color: var(--flutter-yellow); padding: 1px 5px; border-radius: 4px; }
.code-example { background: var(--code-bg); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; margin: 12px 0; }
.code-example-bar { padding: 6px 12px; background: rgba(255,255,255,0.02); border-bottom: 1px solid var(--border); display: flex; gap: 6px; align-items: center; }
.dot-r { width: 8px; height: 8px; border-radius: 50%; background: #ff5f56; }
.dot-y { background: #ffbd2e; }
.dot-g { background: #27c93f; }
.code-file { margin-left: auto; font-size: 0.6rem; font-family: monospace; color: var(--text2); }
.code-example pre { padding: 12px 16px; font-family: 'Fira Code', monospace; font-size: 0.75rem; line-height: 1.6; overflow-x: auto; }
.kw { color: #c792ea; } .fn { color: #82aaff; } .str { color: #c3e88d; } .num { color: #f78c6c; } .cmt { color: #546e7a; }

.task-box { background: rgba(64,196,255,0.05); border: 1px solid rgba(64,196,255,0.2); border-radius: 12px; padding: 16px; }
.task-text { font-size: 0.85rem; line-height: 1.65; }
.hint-toggle { margin-top: 12px; background: none; border: 1px dashed var(--border2); color: var(--text2); font-family: monospace; font-size: 0.7rem; padding: 4px 12px; border-radius: 6px; cursor: pointer; }
.hint-box { display: none; margin-top: 12px; background: rgba(255,234,0,0.05); border: 1px solid rgba(255,234,0,0.2); border-radius: 8px; padding: 10px; font-family: monospace; font-size: 0.72rem; color: var(--flutter-yellow); white-space: pre-wrap; }
.hint-box.open { display: block; }

.editor-pane { flex: 1; display: flex; flex-direction: column; background: var(--code-bg); overflow: hidden; }
.editor-bar { display: flex; justify-content: space-between; align-items: center; padding: 6px 16px; border-bottom: 1px solid var(--border); background: var(--surface); flex-shrink: 0; }
.file-tab { font-family: 'Fira Code', monospace; font-size: 0.7rem; padding: 4px 14px; background: rgba(0,229,255,0.08); border: 1px solid rgba(0,229,255,0.3); border-radius: 6px; color: var(--flutter-cyan); }
.editor-controls { display: flex; gap: 12px; align-items: center; }
.btn-reset, .btn-run {
  font-family: 'Syne', sans-serif; font-size: 0.7rem; font-weight: 700; padding: 6px 16px;
  border-radius: 8px; cursor: pointer; transition: 0.2s; border: none;
}
.btn-reset { background: transparent; border: 1px solid var(--border2); color: var(--text2); }
.btn-reset:hover { border-color: var(--flutter-orange); color: var(--flutter-orange); }
.btn-run { background: linear-gradient(135deg, var(--flutter-deepblue), var(--flutter-blue)); color: white; box-shadow: 0 0 12px rgba(64,196,255,0.5); }
.btn-run:hover { transform: translateY(-1px); filter: brightness(1.05); }
.editor-area { display: flex; flex: 1; min-height: 0; }
.line-col { padding: 14px 0; text-align: right; font-family: monospace; font-size: 0.75rem; color: #3e4a5f; background: #03050a; border-right: 1px solid var(--border); min-width: 48px; }
#editor { flex: 1; background: transparent; border: none; outline: none; color: #e2e8f0; font-family: 'Fira Code', monospace; font-size: 0.78rem; line-height: 1.65; padding: 14px; resize: none; white-space: pre; overflow: auto; caret-color: var(--flutter-cyan); }
.output-zone { height: 150px; border-top: 1px solid var(--border); background: #05070c; display: flex; flex-direction: column; flex-shrink: 0; }
.output-bar { padding: 6px 16px; border-bottom: 1px solid var(--border); font-size: 0.6rem; font-weight: 700; text-transform: uppercase; display: flex; justify-content: space-between; }
.out-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--border2); transition: 0.2s; }
.out-dot.running { background: var(--flutter-yellow); animation: pulse 0.8s infinite; }
.out-dot.ok { background: var(--success); box-shadow: 0 0 8px var(--success); }
.out-dot.err { background: var(--error); }
@keyframes pulse { 0%,100%{ opacity:0.5; } 50%{ opacity:1; } }
#console { flex:1; padding: 8px 16px; font-family: monospace; font-size: 0.75rem; overflow-y: auto; white-space: pre-wrap; }

.modal-bg {
  position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(12px);
  display: flex; align-items: center; justify-content: center; z-index: 200;
  opacity: 0; pointer-events: none; transition: 0.25s;
}
.modal-bg.open { opacity: 1; pointer-events: all; }
.modal-card {
  background: var(--surface); border: 1px solid var(--flutter-blue); border-radius: 28px;
  padding: 36px; max-width: 400px; width: 90%; text-align: center;
  transform: scale(0.9); transition: transform 0.35s cubic-bezier(0.2,1.2,0.8,1);
}
.modal-bg.open .modal-card { transform: scale(1); }
.modal-glyph { font-size: 3rem; margin-bottom: 10px; }
.modal-heading { font-family: 'DM Serif Display', serif; font-size: 1.8rem; margin-bottom: 8px; }
.modal-sub { color: var(--text2); margin-bottom: 20px; }
.xp-pill { background: rgba(64,196,255,0.2); border-radius: 40px; padding: 4px 16px; display: inline-block; margin-bottom: 24px; font-family: monospace; }
.modal-btn { background: linear-gradient(135deg, var(--flutter-deepblue), var(--flutter-blue)); border: none; padding: 12px; border-radius: 40px; font-weight: bold; color: white; width: 100%; cursor: pointer; }

.spark { position: fixed; width: 8px; height: 8px; border-radius: 50%; pointer-events: none; z-index: 999; animation: fly 0.8s ease-out forwards; background: var(--flutter-cyan); }
@keyframes fly { 0% { transform: translate(0,0) scale(1); opacity:1; } 100% { transform: translate(var(--dx), var(--dy)) scale(0); opacity:0; } }
</style>
</head>

  <div class="logo-wrap">
    <div class="logo-icon">🦋</div>

<script>
// =============================== COMPLETE FLUTTER CURRICULUM ===============================
const curriculum = [
  { id:'widgets', name:'Core Widgets', icon:'📱', topic:'UI FUNDAMENTALS', steps:[
    { title:'StatelessWidget & Layout', step:'STEP 1', xp:80,
      question:`<div class="block"><div class="block-label">🧱 StatelessWidget</div><div class="concept-text">Flutter UI = widgets. <code>StatelessWidget</code> is immutable. Common: <code>Scaffold</code>, <code>AppBar</code>, <code>Center</code>, <code>Text</code>, <code>Column</code>, <code>Row</code>.</div></div><div class="code-example"><pre><span class="kw">import 'package:flutter/material.dart';</span>

<span class="kw">void main() => runApp(MyApp());</span>

<span class="kw">class MyApp extends StatelessWidget {</span>
  <span class="kw">@override</span>
  <span class="kw">Widget build(BuildContext context) {</span>
    <span class="kw">return MaterialApp(</span>
      home: Scaffold(
        appBar: AppBar(title: Text('Flutter Forge')),
        body: Center(child: Text('Hello Flutter!')),
      ),
    );
  }
}</pre></div><div class="task-box"><div class="task-text">Create a <code>StatelessWidget</code> called <code>HomePage</code> that returns a <code>Scaffold</code> with AppBar title "Dashboard" and body showing a Column with two Text widgets: "Welcome" and "Start Building".</div><button class="hint-toggle" onclick="toggleHint(this)">💡 Hint</button><div class="hint-box">class HomePage extends StatelessWidget {\n  @override\n  Widget build(BuildContext context) {\n    return Scaffold(\n      appBar: AppBar(title: Text('Dashboard')),\n      body: Column(children: [Text('Welcome'), Text('Start Building')]),\n    );\n  }\n}</div></div>`,
      starter:`import 'package:flutter/material.dart';\n\n// Create HomePage StatelessWidget\n`,
      check(c){ return /class\s+HomePage\s+extends\s+StatelessWidget/.test(c) && /Scaffold/.test(c) && /AppBar.*Dashboard/.test(c) && /Column\(children:.*Text\(['"]Welcome['"]\).*Text\(['"]Start Building['"]\)/.test(c) ? {ok:true, out:"StatelessWidget with Column structure correct"} : {ok:false, msg:"Create HomePage StatelessWidget with Scaffold, AppBar(title:'Dashboard'), body Column with two Texts."}; }
    },
    { title:'StatefulWidget & setState', step:'STEP 2', xp:95,
      question:`<div class="block"><div class="block-label">🔄 StatefulWidget</div><div class="concept-text"><code>StatefulWidget</code> + <code>State</code> class. Use <code>setState()</code> to update UI.</div></div><div class="task-box"><div class="task-text">Create a <code>CounterWidget</code> with a <code>_counter</code> variable, a Text showing the count, and a FloatingActionButton that increments and calls <code>setState()</code>.</div><button class="hint-toggle" onclick="toggleHint(this)">💡 Hint</button><div class="hint-box">class CounterWidget extends StatefulWidget {\n  @override _CounterState createState() => _CounterState();\n}\nclass _CounterState extends State<CounterWidget> {\n  int _counter = 0;\n  void _increment() => setState(() => _counter++);\n  @override Widget build(BuildContext context) {\n    return Scaffold(body: Center(child: Text('$_counter')), floatingActionButton: FloatingActionButton(onPressed: _increment, child: Icon(Icons.add)));\n  }\n}</div></div>`,
      starter:`import 'package:flutter/material.dart';\n\n// CounterWidget with StatefulWidget\n`,
      check(c){ return /class\s+CounterWidget\s+extends\s+StatefulWidget/.test(c) && /class\s+_\w+State\s+extends\s+State<CounterWidget>/.test(c) && /setState\(\(\)\s*=>\s*_counter\+\+/.test(c) && /FloatingActionButton/.test(c) ? {ok:true, out:"StatefulWidget with increment logic correct"} : {ok:false, msg:"Create CounterWidget StatefulWidget, manage _counter, increment with setState, add FAB."}; }
    }
  ]},
  { id:'navigation', name:'Navigation', icon:'🧭', topic:'ROUTING', steps:[
    { title:'Navigator & Routes', step:'STEP 1', xp:90,
      question:`<div class="block"><div class="block-label">🚀 Navigator</div><div class="concept-text"><code>Navigator.push()</code>, <code>Navigator.pop()</code>. Define named routes in MaterialApp.</div></div><div class="task-box"><div class="task-text">Create two screens: <code>HomeScreen</code> with button that pushes to <code>SecondScreen</code> using <code>Navigator.push</code>. SecondScreen shows "Details" and has back button.</div><button class="hint-toggle" onclick="toggleHint(this)">💡 Hint</button><div class="hint-box">Navigator.push(context, MaterialPageRoute(builder: (context) => SecondScreen()));\n// SecondScreen: Scaffold with AppBar (automatically has back)</div></div>`,
      starter:`import 'package:flutter/material.dart';\n\n// Two screens with navigation\n`,
      check(c){ return /Navigator\.push\(context,\s*MaterialPageRoute\(builder:.*SecondScreen/.test(c) && /class\s+SecondScreen\s+extends\s+StatelessWidget/.test(c) && /Scaffold/.test(c) ? {ok:true, out:"Navigation implemented"} : {ok:false, msg:"Implement push navigation from HomeScreen to SecondScreen."}; }
    }
  ]},
  { id:'state', name:'State Management', icon:'📊', topic:'PROVIDER/BLoC', steps:[
    { title:'Provider Package', step:'STEP 1', xp:110,
      question:`<div class="block"><div class="block-label">🔌 Provider</div><div class="concept-text"><code>ChangeNotifier</code> + <code>ChangeNotifierProvider</code>. Use <code>Consumer</code> or <code>Provider.of</code>.</div></div><div class="task-box"><div class="task-text">Create <code>CounterModel</code> extending <code>ChangeNotifier</code> with increment method that calls <code>notifyListeners()</code>. Wrap app with <code>ChangeNotifierProvider</code> and consume in widget.</div><button class="hint-toggle" onclick="toggleHint(this)">💡 Hint</button><div class="hint-box">class CounterModel extends ChangeNotifier {\n  int count = 0;\n  void increment() { count++; notifyListeners(); }\n}\n// Provider: ChangeNotifierProvider(create: (_) => CounterModel())\n// Consumer: Consumer<CounterModel>(builder: (_, model, __) => Text('${model.count}'))</div></div>`,
      starter:`import 'package:flutter/material.dart';\nimport 'package:provider/provider.dart';\n\n// CounterModel and provider setup\n`,

      starter:`import 'package:flutter/material.dart';\n\n// Form with email validation\n`,

  { id:'storage', name:'Local Storage', icon:'💾', topic:'SHARED_PREFERENCES', steps:[
    { title:'SharedPreferences', step:'STEP 1', xp:105,
      question:`<div class="block"><div class="block-label">📦 SharedPreferences</div><div class="concept-text">Store simple key-value data persistently.</div></div><div class="task-box"><div class="task-text">Write function <code>saveTheme(bool isDark)</code> using SharedPreferences. Write <code>loadTheme()</code> that returns Future<bool> with default false.</div><button class="hint-toggle" onclick="toggleHint(this)">💡 Hint</button><div class="hint-box">Future<void> saveTheme(bool isDark) async {\n  final prefs = await SharedPreferences.getInstance();\n  await prefs.setBool('theme_dark', isDark);\n}\nFuture<bool> loadTheme() async {\n  final prefs = await SharedPreferences.getInstance();\n  return prefs.getBool('theme_dark') ?? false;\n}</div></div>`,
      starter:`import 'package:flutter/material.dart';\nimport 'package:shared_preferences/shared_preferences.dart';\n\n// saveTheme and loadTheme\n`,
      check(c){ return /SharedPreferences\.getInstance\(\)/.test(c) && /setBool\(['"]theme_dark['"]/.test(c) && /getBool\(['"]theme_dark['"]\)\s*\?\?\s*false/.test(c) ? {ok:true, out:"SharedPreferences methods correct"} : {ok:false, msg:"Implement saveTheme and loadTheme using SharedPreferences."}; }

    { title:'AnimatedContainer & Tween', step:'STEP 1', xp:120,
      question:`<div class="block"><div class="block-label">🎬 Implicit Animations</div><div class="concept-text"><code>AnimatedContainer</code>, <code>AnimatedOpacity</code> auto-animate property changes.</div></div><div class="task-box"><div class="task-text">Create StatefulWidget with boolean <code>_expanded</code>. AnimatedContainer that changes width from 100 to 200 and color from blue to green when toggled. Toggle with GestureDetector.</div><button class="hint-toggle" onclick="toggleHint(this)">💡 Hint</button><div class="hint-box">AnimatedContainer(\n  duration: Duration(seconds: 1),\n  width: _expanded ? 200 : 100,\n  color: _expanded ? Colors.green : Colors.blue,\n  child: GestureDetector(onTap: () => setState(() => _expanded = !_expanded)),\n)</div></div>`,

// STATE
let state = { ch:0, step:0, xp:0, streak:0, done: new Set(), chDone: new Set(), hinted:false };
function boot(){ buildRail(); loadLesson(); refreshHud(); }
function buildRail(){
  const rail = document.getElementById('rail'); rail.innerHTML='';
  curriculum.forEach((ch,i)=>{
    let locked = !(i===0 || state.chDone.has(i-1) || state.ch===i);
    let tab = document.createElement('div');
    tab.className = `ch-tab ${i===state.ch?'active':''} ${state.chDone.has(i)?'done':''} ${locked?'locked':''}`;
    tab.innerHTML = `<span>${ch.icon}</span>${ch.name}`;
    if(!locked) tab.onclick = ()=>{ state.ch=i; state.step=0; buildRail(); loadLesson(); };
    rail.appendChild(tab);
  });
}
function loadLesson(){
  let ch = curriculum[state.ch]; let step = ch.steps[state.step];
  document.getElementById('hdr-chapter').innerText = ch.name;
  document.getElementById('hdr-steps').innerText = `${state.step+1}/${ch.steps.length}`;
  document.getElementById('b-step').innerText = step.step;
  document.getElementById('b-topic').innerText = ch.topic;
  document.getElementById('l-title').innerText = step.title;
  document.getElementById('l-body').innerHTML = step.question;
  document.getElementById('editor').value = step.starter;
  document.getElementById('console').innerHTML = '<span class="c-dim">// Flutter code ready</span>';
  document.getElementById('o-dot').className = 'out-dot';
  let pct = (state.step/ch.steps.length)*100;
  document.getElementById('prog-fill').style.width = pct+'%';
  syncLines();
}
function refreshHud(){
  document.getElementById('h-xp').innerText = state.xp;
  document.getElementById('h-str').innerText = state.streak;
  document.getElementById('h-lv').innerText = Math.floor(state.xp/350)+1;
}
function syncLines(){ let ta=document.getElementById('editor'); let lines=ta.value.split('\n').length; document.getElementById('lines').innerHTML=Array.from({length:lines},(_,i)=>i+1).join('\n'); }
function tabHandle(e){ if(e.key==='Tab'){ e.preventDefault(); let t=e.target; let s=t.selectionStart; t.value=t.value.slice(0,s)+'    '+t.value.slice(t.selectionEnd); t.selectionStart=t.selectionEnd=s+4; syncLines();} if((e.ctrlKey||e.metaKey)&&e.key==='Enter') runCheck(); }
function resetCode(){ document.getElementById('editor').value=curriculum[state.ch].steps[state.step].starter; document.getElementById('console').innerHTML='<span class="c-dim"># reset</span>'; document.getElementById('o-dot').className='out-dot'; syncLines(); }
function toggleHint(btn){ let box=btn.nextElementSibling; box.classList.toggle('open'); btn.innerText=box.classList.contains('open')?'🙈 Hide':'💡 Hint'; state.hinted=true; }

function runCheck(){
  let code = document.getElementById('editor').value;
  let step = curriculum[state.ch].steps[state.step];
  let dot = document.getElementById('o-dot'); let con = document.getElementById('console');
  dot.className='out-dot running'; con.innerHTML='<span class="c-info">analyzing Flutter code...</span>';
  setTimeout(()=>{
    let r = step.check(code);
    if(r.ok){
      dot.className='out-dot ok';
      con.innerHTML = `<span class="c-ok">✓ Flutter code valid!\n${r.out||''}</span>`;
      let key = `${state.ch}-${state.step}`;
      if(!state.done.has(key)){
        let earned = state.hinted ? Math.floor(step.xp*0.65) : step.xp;
        state.xp += earned; state.streak++; state.done.add(key); refreshHud();
        showModal(true, earned);
      } else showModal(true,0);
      spawnSparks();
    } else {
      dot.className='out-dot err';
      con.innerHTML = `<span class="c-err">✗ ${r.msg}</span>`;
      state.streak = 0; refreshHud();
    }
    state.hinted = false;
  }, 450);
}

function showModal(ok, earned){
  let ch = curriculum[state.ch]; let isLastStep = (state.step === ch.steps.length-1);
  document.getElementById('m-glyph').innerHTML = ok?'🦋✨':'⚠️';
  document.getElementById('m-head').innerHTML = isLastStep?`${ch.name} Mastered!`:'Correct!';
  document.getElementById('m-sub').innerHTML = isLastStep?'Next chapter unlocked. Keep building Flutter apps!' : 'Great Flutter implementation!';
  document.getElementById('m-xp').innerHTML = earned>0?`+${earned} XP`:'Already earned';
  document.getElementById('modal').classList.add('open');
}
function advance(){
  document.getElementById('modal').classList.remove('open');
  let ch = curriculum[state.ch];
  if(state.step < ch.steps.length-1){ state.step++; }
  else {
    state.chDone.add(state.ch);
    if(state.ch < curriculum.length-1){ state.ch++; state.step=0; }
    buildRail();
  }
  loadLesson();
}
function spawnSparks(){
  for(let i=0;i<28;i++){ let sp=document.createElement('div'); sp.className='spark'; let ang=(i/28)*Math.PI*2; let dist=60+Math.random()*120; sp.style.cssText=`left:${window.innerWidth/2}px;top:${window.innerHeight/2}px;--dx:${Math.cos(ang)*dist}px;--dy:${Math.sin(ang)*dist}px;`; document.body.appendChild(sp); setTimeout(()=>sp.remove(),900); }
}
document.addEventListener('keydown',e=>{ if((e.ctrlKey||e.metaKey)&&e.key==='Enter') runCheck(); });
boot();
</script>
