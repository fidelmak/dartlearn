<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Flutter Forge — Master Flutter for Production</title>
<link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800;900&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #060910;
  --surface: #0d1117;
  --surface2: #131920;
  --surface3: #1a2230;
  --border: #1e2d3d;
  --border2: #263545;
  --fl-blue: #40C4FF;
  --fl-deep: #006494;
  --fl-cyan: #00E5FF;
  --fl-green: #64FFDA;
  --fl-orange: #FF8A65;
  --fl-pink: #FF4081;
  --fl-yellow: #FFD740;
  --fl-purple: #B388FF;
  --success: #00E676;
  --error: #FF5252;
  --text: #E1E8F0;
  --text2: #6B8299;
  --text3: #3D5268;
  --code: #050810;
}

*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

body {
  background: var(--bg);
  font-family: 'Outfit', sans-serif;
  color: var(--text);
  height: 100vh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

/* Ambient mesh */
body::before {
  content: '';
  position: fixed; inset: 0;
  background:
    radial-gradient(ellipse 800px 500px at 0% 0%, rgba(0,100,148,0.12) 0%, transparent 60%),
    radial-gradient(ellipse 600px 400px at 100% 100%, rgba(64,196,255,0.07) 0%, transparent 60%);
  pointer-events: none; z-index: 0;
}

/* Dot grid */
body::after {
  content: '';
  position: fixed; inset: 0;
  background-image: radial-gradient(rgba(64,196,255,0.08) 1px, transparent 1px);
  background-size: 28px 28px;
  pointer-events: none; z-index: 0;
}

/* ── HEADER ── */
header {
  display: flex;
  align-items: center;
  padding: 0 24px;
  height: 54px;
  border-bottom: 1px solid var(--border);
  background: rgba(6,9,16,0.97);
  backdrop-filter: blur(20px);
  z-index: 30;
  flex-shrink: 0;
  gap: 20px;
}

.logo {
  display: flex; align-items: center; gap: 10px;
  flex-shrink: 0;
}

.logo-mark {
  width: 34px; height: 34px;
  background: linear-gradient(145deg, var(--fl-blue), var(--fl-deep));
  border-radius: 9px;
  display: grid; place-items: center;
  font-size: 1.1rem;
  box-shadow: 0 0 20px rgba(64,196,255,0.35), inset 0 1px 0 rgba(255,255,255,0.1);
  flex-shrink: 0;
}

.logo-name {
  font-weight: 900;
  font-size: 1.05rem;
  letter-spacing: -0.03em;
  line-height: 1;
}
.logo-name .f { color: var(--fl-cyan); }
.logo-name .rest { color: var(--text); }
.logo-tag {
  font-size: 0.5rem;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--text3);
  margin-top: 2px;
}

.prog-wrap { flex: 1; max-width: 400px; }
.prog-meta { display: flex; justify-content: space-between; font-size: 0.58rem; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text3); margin-bottom: 5px; }
.prog-track { height: 3px; background: var(--border); border-radius: 99px; overflow: hidden; }
.prog-bar {
  height: 100%;
  background: linear-gradient(90deg, var(--fl-deep), var(--fl-blue), var(--fl-cyan));
  border-radius: 99px;
  transition: width 0.5s cubic-bezier(0.34,1.56,0.64,1);
  box-shadow: 0 0 8px rgba(0,229,255,0.5);
}

.hud { display: flex; gap: 8px; flex-shrink: 0; }
.chip {
  font-family: 'Fira Code', monospace;
  font-size: 0.68rem;
  padding: 4px 12px;
  border-radius: 7px;
  border: 1px solid var(--border2);
  background: var(--surface);
  display: flex; align-items: center; gap: 5px;
}
.chip.xp  { border-color: rgba(64,196,255,0.4); color: var(--fl-blue); }
.chip.str { border-color: rgba(255,138,101,0.4); color: var(--fl-orange); }
.chip.lvl { border-color: rgba(100,255,218,0.4); color: var(--fl-green); }

/* ── RAIL ── */
.rail {
  display: flex;
  padding: 0 24px;
  border-bottom: 1px solid var(--border);
  background: rgba(6,9,16,0.95);
  overflow-x: auto;
  flex-shrink: 0;
  scrollbar-width: none;
  z-index: 10;
  position: relative;
  gap: 2px;
}
.rail::-webkit-scrollbar { display: none; }

.rtab {
  padding: 8px 16px;
  font-size: 0.65rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.07em;
  color: var(--text3);
  cursor: pointer;
  border-bottom: 2px solid transparent;
  transition: all 0.2s;
  white-space: nowrap;
  display: flex; align-items: center; gap: 7px;
  flex-shrink: 0;
}
.rtab:hover { color: var(--text2); }
.rtab.active { color: var(--fl-cyan); border-bottom-color: var(--fl-cyan); }
.rtab.done { color: var(--success); }
.rtab.locked { opacity: 0.25; cursor: not-allowed; pointer-events: none; }
.rtab-num {
  font-family: 'Fira Code', monospace;
  font-size: 0.55rem;
  background: var(--surface3);
  padding: 1px 5px;
  border-radius: 3px;
  color: var(--text3);
}

/* ── ARENA ── */
.arena {
  display: flex;
  flex: 1;
  overflow: hidden;
  position: relative;
  z-index: 1;
}

/* ── LESSON PANE ── */
.lpane {
  width: 42%;
  flex-shrink: 0;
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  background: var(--surface);
  overflow: hidden;
}

.lhead {
  padding: 12px 18px;
  border-bottom: 1px solid var(--border);
  background: var(--surface2);
  flex-shrink: 0;
}

.lmeta {
  display: flex; gap: 6px; margin-bottom: 7px; flex-wrap: wrap; align-items: center;
}

.badge {
  font-family: 'Fira Code', monospace;
  font-size: 0.55rem;
  font-weight: 600;
  padding: 2px 8px;
  border-radius: 4px;
  letter-spacing: 0.08em;
}
.badge-s { background: rgba(64,196,255,0.12); color: var(--fl-blue); border: 1px solid rgba(64,196,255,0.25); }
.badge-t { background: rgba(100,255,218,0.08); color: var(--fl-green); border: 1px solid rgba(100,255,218,0.2); }
.badge-d { background: rgba(255,64,129,0.08); color: var(--fl-pink); border: 1px solid rgba(255,64,129,0.2); }

.ltitle { font-weight: 800; font-size: 0.96rem; letter-spacing: -0.02em; line-height: 1.25; }

.lbody {
  flex: 1;
  overflow-y: auto;
  padding: 18px;
  scrollbar-width: thin;
  scrollbar-color: var(--border) transparent;
}
.lbody::-webkit-scrollbar { width: 4px; }
.lbody::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }

/* Content */
.blk { margin-bottom: 18px; animation: fadeUp 0.3s ease both; }
@keyframes fadeUp { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }

.blk-lbl {
  font-size: 0.58rem;
  font-weight: 700;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  margin-bottom: 8px;
  display: flex; align-items: center; gap: 7px;
}
.blk-lbl::after { content:''; flex:1; height:1px; background:var(--border); }
.lbl-c { color: var(--fl-blue); }
.lbl-e { color: var(--fl-orange); }
.lbl-t { color: var(--fl-pink); }

.ctext {
  font-size: 0.83rem;
  line-height: 1.72;
  color: #a0b4c8;
}
.ctext strong { color: var(--fl-green); font-weight: 700; }
.ctext em { color: var(--fl-cyan); font-style: normal; font-weight: 600; }
.ctext code, .ttext code {
  font-family: 'Fira Code', monospace;
  font-size: 0.75rem;
  background: var(--code);
  color: var(--fl-yellow);
  padding: 1px 5px;
  border-radius: 4px;
  border: 1px solid var(--border);
}

.codeblock {
  background: var(--code);
  border: 1px solid var(--border);
  border-radius: 10px;
  overflow: hidden;
  margin: 10px 0;
}
.cblock-bar {
  padding: 6px 12px;
  background: rgba(255,255,255,0.02);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 5px;
}
.dr { width:7px;height:7px;border-radius:50%;background:#ff5f56; }
.dy { width:7px;height:7px;border-radius:50%;background:#ffbd2e; }
.dg { width:7px;height:7px;border-radius:50%;background:#27c93f; }
.cblabel { margin-left:auto; font-family:monospace; font-size:0.58rem; color:var(--text3); }
.codeblock pre {
  padding: 12px 14px;
  font-family: 'Fira Code', monospace;
  font-size: 0.73rem;
  line-height: 1.62;
  overflow-x: auto;
  white-space: pre;
}

/* Dart syntax */
.kw  { color:#c792ea; }
.kw2 { color:#89ddff; }
.fn  { color:#82aaff; }
.str { color:#c3e88d; }
.num { color:#f78c6c; }
.cmt { color:#374e60; font-style:italic; }
.tp  { color:#64ffda; }
.vr  { color:#eeffff; }
.at  { color:#ff8a65; }
.op  { color:#89ddff; }
.wg  { color:#40c4ff; }

.tbox {
  background: rgba(64,196,255,0.04);
  border: 1px solid rgba(64,196,255,0.18);
  border-radius: 10px;
  padding: 14px;
}
.ttext { font-size: 0.83rem; line-height: 1.68; color: #9ab0c4; }
.ttext strong { color: var(--fl-cyan); }
.hint-toggle {
  margin-top: 10px;
  font-family: 'Fira Code', monospace;
  font-size: 0.68rem;
  background: none;
  border: 1px dashed var(--border2);
  color: var(--text3);
  padding: 4px 12px;
  border-radius: 6px;
  cursor: pointer;
  transition: all 0.2s;
}
.hint-toggle:hover { border-color: var(--fl-yellow); color: var(--fl-yellow); }
.hintbox {
  display: none;
  margin-top: 10px;
  padding: 10px 12px;
  background: rgba(255,215,64,0.04);
  border: 1px solid rgba(255,215,64,0.15);
  border-radius: 8px;
  font-family: 'Fira Code', monospace;
  font-size: 0.7rem;
  color: var(--fl-yellow);
  white-space: pre-wrap;
  line-height: 1.6;
}
.hintbox.open { display: block; animation: fadeUp 0.25s ease; }

/* ── EDITOR PANE ── */
.epane {
  flex: 1;
  display: flex;
  flex-direction: column;
  background: var(--code);
  overflow: hidden;
}

.ebar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 16px;
  border-bottom: 1px solid var(--border);
  background: var(--surface2);
  flex-shrink: 0;
  gap: 10px;
}

.filetab {
  font-family: 'Fira Code', monospace;
  font-size: 0.68rem;
  padding: 4px 14px;
  background: rgba(0,229,255,0.07);
  border: 1px solid rgba(0,229,255,0.2);
  border-radius: 6px;
  color: var(--fl-cyan);
  display: flex; align-items: center; gap: 6px;
}

.ebtns { display: flex; align-items: center; gap: 10px; }

.kbd-hint {
  font-family: 'Fira Code', monospace;
  font-size: 0.55rem;
  color: var(--text3);
  border: 1px solid var(--border2);
  padding: 2px 6px;
  border-radius: 4px;
}

.btn-r, .btn-g {
  font-family: 'Outfit', sans-serif;
  font-size: 0.7rem;
  font-weight: 700;
  letter-spacing: 0.05em;
  border: none;
  padding: 6px 16px;
  border-radius: 7px;
  cursor: pointer;
  transition: all 0.18s;
}
.btn-r {
  background: none;
  border: 1px solid var(--border2);
  color: var(--text3);
}
.btn-r:hover { border-color: var(--fl-orange); color: var(--fl-orange); }
.btn-g {
  background: linear-gradient(135deg, var(--fl-deep), var(--fl-blue));
  color: white;
  text-transform: uppercase;
  box-shadow: 0 0 14px rgba(64,196,255,0.35);
  display: flex; align-items: center; gap: 6px;
}
.btn-g:hover { transform: translateY(-1px); box-shadow: 0 0 22px rgba(64,196,255,0.5); }
.btn-g:active { transform: translateY(0); }

.earea { display: flex; flex: 1; min-height: 0; overflow: hidden; }

.linecol {
  padding: 14px 0 14px 10px;
  text-align: right;
  font-family: 'Fira Code', monospace;
  font-size: 0.73rem;
  line-height: 1.65;
  color: var(--text3);
  background: rgba(0,0,0,0.3);
  border-right: 1px solid var(--border);
  min-width: 44px;
  padding-right: 10px;
  user-select: none;
  overflow: hidden;
  flex-shrink: 0;
}

#editor {
  flex: 1;
  background: transparent;
  border: none;
  outline: none;
  color: #cdd6f4;
  font-family: 'Fira Code', monospace;
  font-size: 0.76rem;
  line-height: 1.65;
  padding: 14px;
  resize: none;
  white-space: pre;
  overflow: auto;
  caret-color: var(--fl-cyan);
  tab-size: 2;
  scrollbar-width: thin;
  scrollbar-color: var(--border) transparent;
}
#editor::-webkit-scrollbar { width:5px; height:5px; }
#editor::-webkit-scrollbar-thumb { background: var(--border); border-radius:99px; }

/* Output */
.outzone {
  height: 145px;
  border-top: 1px solid var(--border);
  background: #03050a;
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
}
.outbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 6px 14px;
  border-bottom: 1px solid var(--border);
  font-size: 0.58rem;
  font-weight: 700;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--text3);
  flex-shrink: 0;
}
.outbar-l { display: flex; align-items: center; gap: 8px; }
.odot {
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--border2);
  transition: all 0.3s;
}
.odot.run { background: var(--fl-yellow); box-shadow:0 0 6px var(--fl-yellow); animation:blink 0.5s infinite; }
.odot.ok  { background: var(--success); box-shadow:0 0 8px var(--success); }
.odot.err { background: var(--error); box-shadow:0 0 8px var(--error); }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

#console {
  flex: 1;
  padding: 8px 14px;
  font-family: 'Fira Code', monospace;
  font-size: 0.73rem;
  line-height: 1.65;
  overflow-y: auto;
  white-space: pre-wrap;
  scrollbar-width: thin;
}
.c-ok   { color: var(--success); }
.c-err  { color: var(--error); }
.c-info { color: var(--fl-blue); }
.c-dim  { color: var(--text3); }

/* ── MODAL ── */
.modal-bg {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.82);
  backdrop-filter: blur(14px);
  display: flex; align-items: center; justify-content: center;
  z-index: 200;
  opacity: 0; pointer-events: none;
  transition: opacity 0.25s;
}
.modal-bg.open { opacity: 1; pointer-events: all; }

.modal-card {
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: 22px;
  padding: 36px 32px;
  max-width: 400px;
  width: 90%;
  text-align: center;
  transform: scale(0.88) translateY(16px);
  transition: transform 0.4s cubic-bezier(0.34,1.56,0.64,1);
  box-shadow: 0 40px 80px rgba(0,0,0,0.6), 0 0 30px rgba(64,196,255,0.1);
}
.modal-bg.open .modal-card { transform: scale(1) translateY(0); }

.mglyph { font-size: 3rem; line-height:1; margin-bottom: 12px; }
.mhead {
  font-family: 'Playfair Display', serif;
  font-size: 1.7rem;
  margin-bottom: 8px;
}
.mhead.ok  { color: var(--success); }
.mhead.bad { color: var(--error); }
.msub { font-size: 0.82rem; color: var(--text2); line-height: 1.6; margin-bottom: 18px; }

.mxp {
  display: inline-flex; align-items: center; gap: 5px;
  background: rgba(64,196,255,0.1);
  border: 1px solid rgba(64,196,255,0.25);
  color: var(--fl-blue);
  font-family: 'Fira Code', monospace;
  font-size: 0.75rem;
  font-weight: 700;
  padding: 5px 16px;
  border-radius: 99px;
  margin-bottom: 20px;
}

.mbtn {
  width: 100%;
  font-family: 'Outfit', sans-serif;
  font-size: 0.85rem;
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  background: linear-gradient(135deg, var(--fl-deep), var(--fl-blue));
  color: white;
  border: none;
  padding: 12px;
  border-radius: 12px;
  cursor: pointer;
  transition: all 0.2s;
  box-shadow: 0 0 20px rgba(64,196,255,0.3);
}
.mbtn:hover { transform: translateY(-2px); box-shadow: 0 0 32px rgba(64,196,255,0.45); }

/* Sparks */
.spark {
  position: fixed;
  width: 8px; height: 8px;
  border-radius: 50%;
  pointer-events: none;
  z-index: 999;
  animation: spark 0.85s ease-out forwards;
}
@keyframes spark {
  0%   { transform: translate(0,0) scale(1.3); opacity:1; }
  100% { transform: translate(var(--dx),var(--dy)) scale(0); opacity:0; }
}
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-mark">🦋</div>
    <div>
      <div class="logo-name"><span class="f">Flutter</span><span class="rest"> Forge</span></div>
      <div class="logo-tag">Production Flutter Mastery</div>
    </div>
  </div>
  <div class="prog-wrap">
    <div class="prog-meta"><span id="hdr-ch">Widgets</span><span id="hdr-st">0/0</span></div>
    <div class="prog-track"><div class="prog-bar" id="prog-bar" style="width:0%"></div></div>
  </div>
  <div class="hud">
    <div class="chip xp">⚡ <span id="h-xp">0</span> XP</div>
    <div class="chip str">🔥 <span id="h-str">0</span></div>
    <div class="chip lvl">Lv <span id="h-lv">1</span></div>
  </div>
</header>

<div class="rail" id="rail"></div>

<div class="arena">
  <div class="lpane">
    <div class="lhead">
      <div class="lmeta">
        <span class="badge badge-s" id="b-step">STEP 1</span>
        <span class="badge badge-t" id="b-topic">WIDGETS</span>
        <span class="badge badge-d" id="b-diff">BEGINNER</span>
      </div>
      <div class="ltitle" id="l-title">Flutter Fundamentals</div>
    </div>
    <div class="lbody" id="l-body"></div>
  </div>

  <div class="epane">
    <div class="ebar">
      <div class="filetab">📱 lib/main.dart</div>
      <div class="ebtns">
        <kbd class="kbd-hint">Ctrl+↵</kbd>
        <button class="btn-r" onclick="resetCode()">↺ Reset</button>
        <button class="btn-g" onclick="runCheck()">▶ Analyze Code</button>
      </div>
    </div>
    <div class="earea">
      <div class="linecol" id="lines">1</div>
      <textarea id="editor" spellcheck="false" autocorrect="off"
        onkeydown="tabHandle(event)" oninput="syncLines()"></textarea>
    </div>
    <div class="outzone">
      <div class="outbar">
        <div class="outbar-l"><div class="odot" id="odot"></div> Flutter Analyzer</div>
        <span style="font-size:0.52rem;opacity:0.4;">flutter analyze --no-pub</span>
      </div>
      <div id="console"><span class="c-dim">// Write your Flutter code above and click Analyze...</span></div>
    </div>
  </div>
</div>

<div class="modal-bg" id="modal">
  <div class="modal-card">
    <div class="mglyph" id="mg">🎯</div>
    <div class="mhead ok" id="mh">Correct!</div>
    <div class="msub" id="ms"></div>
    <div class="mxp" id="mxp">+0 XP</div>
    <button class="mbtn" onclick="advance()">Next Lesson →</button>
  </div>
</div>
