<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Football Bet Prediction Model</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:#f9f9f7;color:#1a1a1a;padding:2rem 1rem}
.wrap{max-width:740px;margin:0 auto}
h1{font-size:20px;font-weight:500;margin-bottom:4px}
.sub{font-size:13px;color:#666;margin-bottom:1.5rem}
.row{display:flex;gap:10px;align-items:flex-end;flex-wrap:wrap;margin-bottom:1.5rem}
.field{display:flex;flex-direction:column;gap:4px;flex:1;min-width:140px}
.field label{font-size:11px;color:#999;text-transform:uppercase;letter-spacing:.05em}
input[type=text]{width:100%;padding:9px 12px;font-size:14px;border:1px solid #ddd;border-radius:8px;background:#fff;color:#1a1a1a;outline:none}
input[type=text]:focus{border-color:#aaa}
.btn{padding:9px 20px;font-size:14px;border-radius:8px;border:1px solid #ddd;background:#fff;color:#1a1a1a;cursor:pointer;white-space:nowrap;align-self:flex-end}
.btn:hover{background:#f0f0ef}
.btn:disabled{opacity:.5;cursor:not-allowed}
.card{background:#fff;border:1px solid #e8e8e8;border-radius:12px;padding:1.25rem;margin-bottom:1rem}
.matchup-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:1.25rem;gap:8px}
.team-block{flex:1}
.team-block.right{text-align:right}
.team-nm{font-size:15px;font-weight:500}
.team-pct{font-size:30px;font-weight:500;margin-top:4px}
.pct-home{color:#185FA5}
.pct-away{color:#993C1D}
.vs-block{text-align:center;padding:0 12px}
.vs-score{font-size:22px;font-weight:500}
.vs-label{font-size:11px;color:#999;margin-top:2px}
.bar-track{display:flex;height:8px;border-radius:99px;overflow:hidden;background:#f0f0ef;margin-bottom:1.25rem}
.bar-h{background:#185FA5;height:100%}
.bar-a{background:#993C1D;height:100%}
.games-grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
.col-title{font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:#999;margin-bottom:8px}
.game-row{display:flex;align-items:center;gap:8px;margin-bottom:6px;font-size:13px;color:#555}
.badge{width:22px;height:22px;border-radius:4px;font-size:11px;font-weight:500;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.bW{background:#EAF3DE;color:#27500A}
.bD{background:#FAEEDA;color:#633806}
.bL{background:#FCEBEB;color:#791F1F}
.pt-tag{margin-left:auto;font-size:11px;color:#aaa}
.totals-row{display:flex;justify-content:space-between;border-top:1px solid #eee;padding-top:8px;margin-top:6px;font-size:12px;color:#666}
.verdict{margin-top:1rem;padding:10px 14px;border-radius:8px;background:#f5f5f3;font-size:13px;color:#555;line-height:1.6}
.err{color:#A32D2D;font-size:13px;padding:.75rem 0}
.spinner{display:inline-block;width:14px;height:14px;border:2px solid #ddd;border-top-color:#555;border-radius:50%;animation:spin .7s linear infinite;margin-right:8px;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}
.status{font-size:13px;color:#888;padding:.5rem 0}
.note{margin-top:8px;font-size:11px;color:#aaa}
</style>
</head>
<body>
<div class="wrap">
  <h1>Football Bet Prediction Model</h1>
  <p class="sub">Enter any two teams — fetches their last 5 real results and calculates win probability.<br>Win  &nbsp;·&nbsp; Draw  &nbsp;·&nbsp; Loss  &nbsp;·&nbsp;</p>

  <div class="row">
    <div class="field">
      <label>Home team</label>
      <input type="text" id="homeInput" placeholder="e.g. Hellas Verona" value="Hellas Verona"/>
    </div>
    <div class="field">
      <label>Away team</label>
      <input type="text" id="awayInput" placeholder="e.g. Fiorentina" value="Fiorentina"/>
    </div>
    <button class="btn" id="analyzeBtn" onclick="analyze()">Analyze ↗</button>
  </div>

  <div id="out"></div>
</div>

<script>
const ptMap = { W: 3, D: 2, L: 1 };

function calcPts(games) {
  return games.reduce((s, g) => s + (ptMap[g.result] || 0), 0);
}

function render(data) {
  const hPts = calcPts(data.homeGames);
  const aPts = calcPts(data.awayGames);
  const total = hPts + aPts;
  const hPct = total > 0 ? Math.round((hPts / total) * 100) : 50;
  const aPct = 100 - hPct;

  const gameRows = (games, side) =>
    games.map(g => {
      const pts = ptMap[g.result] || 0;
      return `<div class="game-row">
        <span class="badge b${g.result}">${g.result}</span>
        <span>${g.opponent || '—'} <span style="color:#aaa">${g.score || ''}</span></span>
        <span class="pt-tag">${pts}pt</span>
      </div>`;
    }).join('') +
    `<div class="totals-row">
      <span>Total points</span>
      <span style="font-weight:500">${side === 0 ? hPts : aPts} / ${games.length * 3} pts</span>
    </div>`;

  let verdict = '';
  if (hPct > aPct + 10)
    verdict = `<strong>${data.home}</strong> are in better recent form — home win leaning (${hPct}% vs ${aPct}%).`;
  else if (aPct > hPct + 10)
    verdict = `<strong>${data.away}</strong> are in better recent form — away win leaning (${aPct}% vs ${hPct}%).`;
  else
    verdict = `Both teams are closely matched in form (${hPct}% vs ${aPct}%) — could go either way.`;

  const liveBlock = data.liveScore && data.liveScore !== 'null'
    ? `<div class="vs-score">${data.liveScore}</div><div class="vs-label">live</div>`
    : `<div class="vs-score">vs</div>`;

  document.getElementById('out').innerHTML = `
    <div class="card">
      <div class="matchup-header">
        <div class="team-block">
          <div class="team-nm">${data.home}</div>
          <div class="team-pct pct-home">${hPct}%</div>
        </div>
        <div class="vs-block">${liveBlock}</div>
        <div class="team-block right">
          <div class="team-nm">${data.away}</div>
          <div class="team-pct pct-away">${aPct}%</div>
        </div>
      </div>
      <div class="bar-track">
        <div class="bar-h" style="width:${hPct}%"></div>
        <div class="bar-a" style="width:${aPct}%"></div>
      </div>
      <div class="games-grid">
        <div>
          <div class="col-title">${data.home} — last ${data.homeGames.length}</div>
          ${gameRows(data.homeGames, 0)}
        </div>
        <div>
          <div class="col-title">${data.away} — last ${data.awayGames.length}</div>
          ${gameRows(data.awayGames, 1)}
        </div>
      </div>
      <div class="verdict">${verdict}</div>
      ${data.note ? `<div class="note">${data.note}</div>` : ''}
    </div>`;
}

async function analyze() {
  const home = document.getElementById('homeInput').value.trim();
  const away = document.getElementById('awayInput').value.trim();
  if (!home || !away) return;

  const btn = document.getElementById('analyzeBtn');
  btn.disabled = true;
  document.getElementById('out').innerHTML =
    `<div class="status"><span class="spinner"></span>Fetching real match data for ${home} and ${away}...</div>`;

  const prompt = `You are a football data assistant. The user wants to analyze: ${home} vs ${away}.

Search the web right now for:
1. The last 5 completed match results for ${home} (result W/D/L, opponent, score)
2. The last 5 completed match results for ${away} (result W/D/L, opponent, score)
3. If there is a live or very recent score for ${home} vs ${away}, include it.

Return ONLY a valid JSON object, no markdown, no explanation, no backticks:
{
  "home": "${home}",
  "away": "${away}",
  "liveScore": "1-0 or null if no live game",
  "homeGames": [
    {"result":"W","opponent":"Team Name","score":"2-1"},
    {"result":"D","opponent":"Team Name","score":"1-1"},
    {"result":"L","opponent":"Team Name","score":"0-2"},
    {"result":"W","opponent":"Team Name","score":"3-0"},
    {"result":"W","opponent":"Team Name","score":"1-0"}
  ],
  "awayGames": [
    {"result":"W","opponent":"Team Name","score":"2-0"},
    {"result":"L","opponent":"Team Name","score":"1-2"},
    {"result":"D","opponent":"Team Name","score":"0-0"},
    {"result":"W","opponent":"Team Name","score":"2-1"},
    {"result":"L","opponent":"Team Name","score":"0-1"}
  ],
  "note": "Data sourced from web search as of today"
}

Use real, accurate results from their actual recent matches. If a live score exists set liveScore, otherwise null.`;

  try {
    const res = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 1000,
        tools: [{ "type": "web_search_20250305", "name": "web_search" }],
        messages: [{ role: "user", content: prompt }]
      })
    });

    const d = await res.json();
    const textBlock = d.content.filter(b => b.type === "text").map(b => b.text).join("");
    const clean = textBlock.replace(/```json|```/g, "").trim();
    const start = clean.indexOf("{");
    const end = clean.lastIndexOf("}");
    if (start === -1 || end === -1) throw new Error("No JSON found in response");
    const parsed = JSON.parse(clean.slice(start, end + 1));
    if (!parsed.homeGames || !parsed.awayGames) throw new Error("Missing game data");
    render(parsed);
  } catch (e) {
    document.getElementById('out').innerHTML =
      `<div class="err">Could not load data: ${e.message}. Try again or check team names.</div>`;
  }

  btn.disabled = false;
}

analyze();
</script>
</body>
</html>
