<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>C# Forge — Master C# by Building</title>
<link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;400;500;600;700&family=Syne:wght@400;600;700;800&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0d0f14;
  --surface: #13161f;
  --surface2: #181c28;
  --border: #232840;
  --border2: #2e3555;
  --cs-purple: #9b59ff;
  --cs-violet: #7c3aed;
  --cs-green: #22d3a8;
  --cs-orange: #ff8c42;
  --cs-red: #ff4757;
  --cs-gold: #ffd700;
  --cs-sky: #38bdf8;
  --success: #22d3a8;
  --error: #ff4757;
  --text: #e2e8f8;
  --text2: #8892b0;
  --code-bg: #080a10;
  --glow-p: 0 0 24px rgba(155,89,255,0.35);
  --glow-g: 0 0 24px rgba(34,211,168,0.35);
}

*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

body {
  background: var(--bg);
  font-family: 'Syne', sans-serif;
  color: var(--text);
  height: 100vh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  position: relative;
}

/* Diagonal stripe texture */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image: repeating-linear-gradient(
    -45deg,
    transparent,
    transparent 40px,
    rgba(155,89,255,0.012) 40px,
    rgba(155,89,255,0.012) 41px
  );
  pointer-events: none;
  z-index: 0;
}

/* Ambient glow blobs */
body::after {
  content: '';
  position: fixed;
  width: 600px; height: 600px;
  background: radial-gradient(circle, rgba(124,58,237,0.08) 0%, transparent 70%);
  top: -200px; left: -100px;
  pointer-events: none;
  z-index: 0;
}

/* ── HEADER ── */
header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 28px;
  border-bottom: 1px solid var(--border);
  background: rgba(13,15,20,0.97);
  backdrop-filter: blur(16px);
  position: relative;
  z-index: 20;
  flex-shrink: 0;
  gap: 20px;
}

.logo-wrap {
  display: flex;
  align-items: center;
  gap: 12px;
  flex-shrink: 0;
}

.logo-icon {
  width: 36px; height: 36px;
  background: linear-gradient(135deg, var(--cs-purple), var(--cs-violet));
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 1rem;
  box-shadow: var(--glow-p);
  flex-shrink: 0;
}

.logo-text {
  font-family: 'Syne', sans-serif;
  font-weight: 800;
  font-size: 1.15rem;
  letter-spacing: -0.03em;
  line-height: 1;
}
.logo-text .cs { color: var(--cs-purple); }
.logo-text .forge { color: var(--text); }
.logo-sub {
  font-size: 0.58rem;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--text2);
  margin-top: 2px;
}

.header-mid {
  flex: 1;
  max-width: 420px;
}

.prog-row {
  display: flex;
  justify-content: space-between;
  font-size: 0.62rem;
  font-weight: 600;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--text2);
  margin-bottom: 5px;
}
.prog-track {
  height: 3px;
  background: var(--border);
  border-radius: 99px;
  overflow: hidden;
}
.prog-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--cs-violet), var(--cs-purple), var(--cs-sky));
  border-radius: 99px;
  transition: width 0.6s cubic-bezier(0.34,1.56,0.64,1);
  box-shadow: 0 0 10px rgba(155,89,255,0.6);
}

.hud {
  display: flex;
  gap: 10px;
  flex-shrink: 0;
}
.hud-chip {
  font-family: 'Fira Code', monospace;
  font-size: 0.7rem;
  padding: 5px 13px;
  border-radius: 6px;
  border: 1px solid var(--border2);
  background: var(--surface);
  display: flex; align-items: center; gap: 6px;
  transition: all 0.3s;
  white-space: nowrap;
}
.hud-chip.xp   { border-color: rgba(155,89,255,0.4); color: var(--cs-purple); }
.hud-chip.fire { border-color: rgba(255,140,66,0.4); color: var(--cs-orange); }
.hud-chip.lvl  { border-color: rgba(34,211,168,0.4); color: var(--cs-green); }

/* ── CHAPTER RAIL ── */
.chapter-rail {
  display: flex;
  padding: 0 28px;
  border-bottom: 1px solid var(--border);
  background: rgba(13,15,20,0.9);
  flex-shrink: 0;
  overflow-x: auto;
  scrollbar-width: none;
  gap: 0;
  position: relative;
  z-index: 10;
}
.chapter-rail::-webkit-scrollbar { display: none; }

.ch-tab {
  padding: 9px 18px;
  font-size: 0.68rem;
  font-weight: 700;
  letter-spacing: 0.07em;
  text-transform: uppercase;
  color: var(--text2);
  cursor: pointer;
  border-bottom: 2px solid transparent;
  transition: all 0.2s;
  white-space: nowrap;
  display: flex;
  align-items: center;
  gap: 7px;
  flex-shrink: 0;
}
.ch-tab:hover { color: var(--text); }
.ch-tab.active { color: var(--cs-purple); border-bottom-color: var(--cs-purple); }
.ch-tab.done { color: var(--success); }
.ch-tab.done .ch-icon::after { content: ' ✓'; }
.ch-tab.locked { opacity: 0.3; cursor: not-allowed; pointer-events: none; }
.ch-num {
  font-family: 'Fira Code', monospace;
  font-size: 0.58rem;
  opacity: 0.6;
}

/* ── MAIN SPLIT ── */
.arena {
  display: flex;
  flex: 1;
  overflow: hidden;
  position: relative;
  z-index: 1;
}

/* ── LEFT: LESSON ── */
.lesson-pane {
  width: 41%;
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  background: var(--surface);
  overflow: hidden;
  flex-shrink: 0;
}

.lesson-head {
  padding: 14px 20px 12px;
  border-bottom: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  gap: 6px;
  flex-shrink: 0;
  background: var(--surface2);
}

.lesson-meta {
  display: flex;
  align-items: center;
  gap: 8px;
}

.badge-step {
  font-family: 'Fira Code', monospace;
  font-size: 0.58rem;
  letter-spacing: 0.1em;
  padding: 2px 9px;
  border-radius: 4px;
  background: rgba(155,89,255,0.12);
  color: var(--cs-purple);
  border: 1px solid rgba(155,89,255,0.3);
  text-transform: uppercase;
}

.badge-topic {
  font-family: 'Fira Code', monospace;
  font-size: 0.58rem;
  padding: 2px 9px;
  border-radius: 4px;
  background: rgba(34,211,168,0.08);
  color: var(--cs-green);
  border: 1px solid rgba(34,211,168,0.2);
  text-transform: uppercase;
  letter-spacing: 0.1em;
}

.lesson-title {
  font-weight: 800;
  font-size: 1rem;
  letter-spacing: -0.02em;
  line-height: 1.2;
}

.lesson-body {
  flex: 1;
  overflow-y: auto;
  padding: 20px;
  scrollbar-width: thin;
  scrollbar-color: var(--border) transparent;
}
.lesson-body::-webkit-scrollbar { width: 4px; }
.lesson-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }

/* Content blocks */
.block { margin-bottom: 20px; animation: rise 0.4s ease both; }
@keyframes rise {
  from { opacity:0; transform: translateY(14px); }
  to   { opacity:1; transform: translateY(0); }
}

.block-label {
  font-size: 0.58rem;
  font-weight: 700;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.block-label::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}
.concept-lbl { color: var(--cs-sky); }
.syntax-lbl  { color: var(--cs-orange); }
.task-lbl    { color: var(--cs-purple); }

.concept-text {
  font-size: 0.84rem;
  line-height: 1.72;
  color: #a8b4d0;
}
.concept-text strong { color: var(--cs-green); font-weight: 700; }
.concept-text em { color: var(--cs-orange); font-style: normal; }
.concept-text code {
  font-family: 'Fira Code', monospace;
  font-size: 0.77rem;
  background: var(--code-bg);
  color: var(--cs-gold);
  padding: 1px 6px;
  border-radius: 4px;
  border: 1px solid var(--border);
}

.code-example {
  background: var(--code-bg);
  border: 1px solid var(--border);
  border-radius: 10px;
  overflow: hidden;
  position: relative;
}

.code-example-bar {
  padding: 7px 14px;
  background: rgba(255,255,255,0.03);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 6px;
}
.dot-r { width:8px;height:8px;border-radius:50%;background:#ff5f56; }
.dot-y { width:8px;height:8px;border-radius:50%;background:#ffbd2e; }
.dot-g { width:8px;height:8px;border-radius:50%;background:#27c93f; }
.code-file { margin-left:auto; font-family:'Fira Code',monospace; font-size:0.6rem; color:var(--text2); }

.code-example pre {
  padding: 14px 16px;
  font-family: 'Fira Code', monospace;
  font-size: 0.76rem;
  line-height: 1.68;
  overflow-x: auto;
  white-space: pre;
}
/* Syntax colors */
.kw  { color: #c792ea; }
.kw2 { color: #89ddff; }
.fn  { color: #82aaff; }
.str { color: #c3e88d; }
.num { color: #f78c6c; }
.cmt { color: #3d5166; font-style: italic; }
.tp  { color: var(--cs-green); }
.vr  { color: #eeffff; }
.op  { color: #89ddff; }
.at  { color: var(--cs-orange); }

.task-box {
  background: rgba(155,89,255,0.06);
  border: 1px solid rgba(155,89,255,0.22);
  border-radius: 10px;
  padding: 16px;
}
.task-text {
  font-size: 0.83rem;
  line-height: 1.7;
  color: #a8b4d0;
}
.task-text code {
  font-family: 'Fira Code', monospace;
  font-size: 0.76rem;
  background: var(--code-bg);
  color: var(--cs-gold);
  padding: 1px 6px;
  border-radius: 4px;
  border: 1px solid var(--border);
}
.task-text strong { color: var(--cs-purple); }

.hint-toggle {
  margin-top: 12px;
  font-family: 'Fira Code', monospace;
  font-size: 0.7rem;
  background: none;
  border: 1px dashed var(--border2);
  color: var(--text2);
  padding: 5px 14px;
  border-radius: 6px;
  cursor: pointer;
  transition: all 0.2s;
}
.hint-toggle:hover { border-color: var(--cs-gold); color: var(--cs-gold); }
.hint-box {
  display: none;
  margin-top: 10px;
  padding: 11px 14px;
  background: rgba(255,215,0,0.05);
  border: 1px solid rgba(255,215,0,0.18);
  border-radius: 8px;
  font-family: 'Fira Code', monospace;
  font-size: 0.72rem;
  color: var(--cs-gold);
  line-height: 1.65;
  white-space: pre-wrap;
}
.hint-box.open { display: block; animation: rise 0.3s ease; }

/* ── RIGHT: EDITOR ── */
.editor-pane {
  flex: 1;
  display: flex;
  flex-direction: column;
  background: var(--code-bg);
  overflow: hidden;
}

.editor-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 9px 16px;
  border-bottom: 1px solid var(--border);
  background: rgba(19,22,31,0.95);
  flex-shrink: 0;
  gap: 12px;
}

.file-tabs {
  display: flex;
  gap: 0;
}
.file-tab {
  font-family: 'Fira Code', monospace;
  font-size: 0.68rem;
  padding: 5px 16px;
  color: var(--cs-green);
  background: rgba(34,211,168,0.07);
  border: 1px solid rgba(34,211,168,0.2);
  border-radius: 6px 6px 0 0;
  display: flex; align-items: center; gap: 7px;
}

.editor-controls {
  display: flex;
  align-items: center;
  gap: 10px;
}

.btn-reset {
  font-family: 'Fira Code', monospace;
  font-size: 0.68rem;
  background: none;
  border: 1px solid var(--border2);
  color: var(--text2);
  padding: 6px 14px;
  border-radius: 6px;
  cursor: pointer;
  transition: all 0.2s;
}
.btn-reset:hover { border-color: var(--cs-orange); color: var(--cs-orange); }

.btn-run {
  font-family: 'Syne', sans-serif;
  font-size: 0.75rem;
  font-weight: 800;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  background: linear-gradient(135deg, var(--cs-violet), var(--cs-purple));
  color: #fff;
  border: none;
  padding: 7px 22px;
  border-radius: 6px;
  cursor: pointer;
  transition: all 0.2s;
  box-shadow: 0 0 18px rgba(124,58,237,0.4);
  display: flex; align-items: center; gap: 8px;
}
.btn-run:hover { transform: translateY(-1px); box-shadow: 0 0 28px rgba(155,89,255,0.55); }
.btn-run:active { transform: translateY(0); }

.shortcut-hint {
  font-family: 'Fira Code', monospace;
  font-size: 0.58rem;
  color: var(--text2);
  border: 1px solid var(--border);
  padding: 2px 6px;
  border-radius: 4px;
}

/* Editor area */
.editor-area {
  flex: 1;
  display: flex;
  overflow: hidden;
  min-height: 0;
}

.line-col {
  padding: 16px 0 16px 0;
  text-align: right;
  font-family: 'Fira Code', monospace;
  font-size: 0.76rem;
  line-height: 1.65;
  color: #2e3a55;
  padding-right: 14px;
  padding-left: 10px;
  user-select: none;
  flex-shrink: 0;
  background: rgba(0,0,0,0.25);
  border-right: 1px solid var(--border);
  min-width: 46px;
  overflow: hidden;
}

#editor {
  flex: 1;
  background: transparent;
  border: none;
  outline: none;
  color: #cdd6f4;
  font-family: 'Fira Code', monospace;
  font-size: 0.78rem;
  line-height: 1.65;
  padding: 16px 16px;
  resize: none;
  tab-size: 4;
  caret-color: var(--cs-purple);
  white-space: pre;
  overflow: auto;
  scrollbar-width: thin;
  scrollbar-color: var(--border) transparent;
}
#editor::-webkit-scrollbar { width:6px; height:6px; }
#editor::-webkit-scrollbar-thumb { background: var(--border); border-radius:99px; }

/* Output */
.output-zone {
  height: 150px;
  border-top: 1px solid var(--border);
  background: #060810;
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
}
.output-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 7px 16px;
  border-bottom: 1px solid var(--border);
  font-size: 0.6rem;
  font-weight: 700;
  letter-spacing: 0.13em;
  text-transform: uppercase;
  color: var(--text2);
  flex-shrink: 0;
}
.out-indicators { display: flex; align-items: center; gap: 8px; }
.out-dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: var(--border2);
  transition: all 0.3s;
}
.out-dot.running { background: var(--cs-gold); box-shadow: 0 0 8px var(--cs-gold); animation: blink 0.5s infinite; }
.out-dot.ok  { background: var(--success); box-shadow: 0 0 8px var(--success); }
.out-dot.err { background: var(--error); box-shadow: 0 0 8px var(--error); }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

#console {
  flex: 1;
  padding: 10px 16px;
  font-family: 'Fira Code', monospace;
  font-size: 0.75rem;
  line-height: 1.65;
  overflow-y: auto;
  white-space: pre-wrap;
  scrollbar-width: thin;
  scrollbar-color: var(--border) transparent;
}
.c-ok   { color: var(--success); }
.c-err  { color: var(--error); }
.c-info { color: var(--cs-sky); }
.c-dim  { color: var(--text2); }
.c-warn { color: var(--cs-gold); }

/* ── MODAL ── */
.modal-bg {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.75);
  backdrop-filter: blur(10px);
  display: flex; align-items: center; justify-content: center;
  z-index: 200;
  opacity: 0; pointer-events: none;
  transition: opacity 0.3s;
}
.modal-bg.open { opacity: 1; pointer-events: all; }

.modal-card {
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: 20px;
  padding: 40px 36px;
  max-width: 420px;
  width: 92%;
  text-align: center;
  transform: scale(0.88) translateY(24px);
  transition: transform 0.45s cubic-bezier(0.34,1.56,0.64,1);
  box-shadow: 0 40px 80px rgba(0,0,0,0.6), var(--glow-p);
}
.modal-bg.open .modal-card { transform: scale(1) translateY(0); }

.modal-glyph { font-size: 3.2rem; margin-bottom: 14px; display: block; line-height: 1; }
.modal-heading {
  font-family: 'DM Serif Display', serif;
  font-size: 1.8rem;
  margin-bottom: 10px;
  line-height: 1.1;
}
.modal-heading.ok  { color: var(--success); }
.modal-heading.bad { color: var(--error); }
.modal-sub { font-size: 0.82rem; color: var(--text2); line-height: 1.6; margin-bottom: 20px; }

.xp-pill {
  display: inline-flex; align-items: center; gap: 6px;
  background: rgba(155,89,255,0.1);
  border: 1px solid rgba(155,89,255,0.3);
  color: var(--cs-purple);
  font-family: 'Fira Code', monospace;
  font-size: 0.78rem;
  font-weight: 700;
  padding: 6px 18px;
  border-radius: 99px;
  margin-bottom: 22px;
}

.modal-btn {
  width: 100%;
  font-family: 'Syne', sans-serif;
  font-size: 0.85rem;
  font-weight: 800;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  background: linear-gradient(135deg, var(--cs-violet), var(--cs-purple));
  color: #fff;
  border: none;
  padding: 13px;
  border-radius: 10px;
  cursor: pointer;
  transition: all 0.2s;
  box-shadow: 0 0 24px rgba(124,58,237,0.4);
}
.modal-btn:hover { transform: translateY(-2px); box-shadow: 0 0 36px rgba(155,89,255,0.5); }

/* Particles */
.spark {
  position: fixed;
  width: 9px; height: 9px;
  border-radius: 50%;
  pointer-events: none;
  z-index: 999;
  animation: sparkfly 0.9s ease-out forwards;
}
@keyframes sparkfly {
  0%   { transform: translate(0,0) scale(1.2); opacity:1; }
  100% { transform: translate(var(--dx),var(--dy)) scale(0); opacity:0; }
}

/* scrollbar */
::-webkit-scrollbar { width:5px; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius:99px; }
</style>
</head>
<body>

<header>
  <div class="logo-wrap">
    <div class="logo-icon">C#</div>

    <div>
      <div class="logo-text"><span class="cs">C#</span><span class="forge"> Forge</span></div>
      <div class="logo-sub">Master C# by Building</div>
    </div>
  </div>
  <div class="header-mid">
    <div class="prog-row">
        <div>---Support Paul with a donation </div> --
  <div>account number :9072210193 opay--</div>
      <span id="hdr-chapter">Variables</span>
      <span id="hdr-steps">0 / 0</span>
    </div>
    <div class="prog-track">
      <div class="prog-fill" id="prog-fill" style="width:0%"></div>
    </div>
  </div>
  <div class="hud">
    <div class="hud-chip xp">⚡ <span id="h-xp">0</span> XP</div>
    <div class="hud-chip fire">🔥 <span id="h-str">0</span></div>
    <div class="hud-chip lvl">Lv <span id="h-lv">1</span></div>
  </div>
</header>

<nav class="chapter-rail" id="rail"></nav>

<div class="arena">
  <!-- LESSON -->
  <div class="lesson-pane">
    <div class="lesson-head">
      <div class="lesson-meta">
        <span class="badge-step" id="b-step">STEP 1</span>
        <span class="badge-topic" id="b-topic">BASICS</span>
      </div>
      <div class="lesson-title" id="l-title">Welcome to C#</div>
    </div>
    <div class="lesson-body" id="l-body"></div>
  </div>

  <!-- EDITOR -->
  <div class="editor-pane">
    <div class="editor-bar">
      <div class="file-tabs">
        <div class="file-tab">⬡ Program.cs</div>
      </div>
      <div class="editor-controls">
        <kbd class="shortcut-hint">Ctrl+Enter</kbd>
        <button class="btn-reset" onclick="resetCode()">↺ Reset</button>
        <button class="btn-run" onclick="runCheck()">▶ Compile &amp; Check</button>
      </div>
    </div>
    <div class="editor-area">
      <div class="line-col" id="lines">1</div>
      <textarea id="editor" spellcheck="false" autocorrect="off"
        onkeydown="tabHandle(event)" oninput="syncLines()"></textarea>
    </div>
    <div class="output-zone">
      <div class="output-bar">
        <div class="out-indicators">
          <div class="out-dot" id="o-dot"></div>

      Call both: <code>multiply(7, 6)</code> and <code>shout("hello")</code>.
    </div>
    <button class="hint-toggle" onclick="toggleHint(this)">💡 Hint</button>
    <div class="hint-box">Func&lt;int, int, int&gt; multiply = (a, b) => a * b;\nAction&lt;string&gt; shout = s => Console.WriteLine(s.ToUpper());\nConsole.WriteLine(multiply(7, 6));\nshout("hello");</div>
  </div>
</div>`,
      starter:`using System;\n\nclass Program {\n    static void Main() {\n        // Func and Action lambdas\n        \n    }\n}`,
      check(c) {
        const hasFunc   = /Func<int,\s*int,\s*int>\s+multiply/.test(c) || /Func<int, int, int>\s+multiply/.test(c);
        const hasAction = /Action<string>\s+shout/.test(c);
        const hasUpper  = /ToUpper/.test(c);
        const hasCall   = /multiply\s*\(\s*7\s*,\s*6\s*\)/.test(c);
        if (!hasFunc)   return { ok:false, msg:'Declare: Func<int, int, int> multiply = (a, b) => a * b;' };
        if (!hasAction) return { ok:false, msg:'Declare: Action<string> shout = ...' };
        if (!hasUpper)  return { ok:false, msg:'Use .ToUpper() in shout.' };
        if (!hasCall)   return { ok:false, msg:'Call multiply(7, 6) and print result.' };
        return { ok:true, out:'42\nHELLO' };
      }
    }
  ]
},

// ── 14. NULLABLE & NULL COALESCING ────────────────────────
{
  id:'nullable', name:'Null Handling', icon:'🕳️', topic:'NULL SAFETY',
  steps:[
    {
      title:'Nullable Types & ?? Operator',
      step:'STEP 1', xp:110,
      question:`
<div class="block">
  <div class="block-label concept-lbl">Concept</div>
  <div class="concept-text">
    Value types (<code>int</code>, <code>double</code>) can't normally be <code>null</code>. Add <code>?</code> to make them nullable: <code>int?</code>.<br>
    <code>??</code> (null-coalescing) returns the right side when the left is null.<br>
    <code>?.</code> (null-conditional) safely accesses a member without throwing.
  </div>
</div>
<div class="block">
  <div class="block-label syntax-lbl">Example</div>
  <div class="code-example">
    <div class="code-example-bar"><div class="dot-r"></div><div class="dot-y"></div><div class="dot-g"></div></div>
    <pre><span class="tp">int</span><span class="op">?</span> <span class="vr">age</span> <span class="op">=</span> <span class="kw">null</span>;
<span class="tp">int</span> <span class="vr">result</span> <span class="op">=</span> age <span class="op">??</span> <span class="num">18</span>;       <span class="cmt">// 18</span>
<span class="tp">string</span><span class="op">?</span> <span class="vr">name</span> <span class="op">=</span> <span class="kw">null</span>;
Console<span class="op">.</span><span class="fn">WriteLine</span>(name<span class="op">?.</span>Length);   <span class="cmt">// null (no crash)</span>
Console<span class="op">.</span><span class="fn">WriteLine</span>(name <span class="op">??</span> <span class="str">"Guest"</span>); <span class="cmt">// Guest</span></pre>
  </div>
</div>
<div class="block">
  <div class="block-label task-lbl">⚡ Your Challenge</div>
  <div class="task-box">
    <div class="task-text">
      Declare <code>string? username = null;</code><br>
      Use <code>??</code> to print <code>"Anonymous"</code> if it's null.<br>
      Then assign <code>username = "Coder42";</code> and print the actual value using <code>??</code> again.
    </div>
    <button class="hint-toggle" onclick="toggleHint(this)">💡 Hint</button>
    <div class="hint-box">string? username = null;\nConsole.WriteLine(username ?? "Anonymous");\nusername = "Coder42";\nConsole.WriteLine(username ?? "Anonymous");</div>
  </div>
</div>`,
      starter:`using System;\n\nclass Program {\n    static void Main() {\n        // Nullable and ?? operator\n        \n    }\n}`,
      check(c) {
        const hasNull   = /string\?\s+username\s*=\s*null/.test(c);
        const hasCoal   = /username\s*\?\?\s*"Anonymous"/.test(c);
        const hasAssign = /username\s*=\s*"Coder42"/.test(c);
        if (!hasNull)   return { ok:false, msg:'Declare: string? username = null;' };
        if (!hasCoal)   return { ok:false, msg:'Use: username ?? "Anonymous"' };
        if (!hasAssign) return { ok:false, msg:'Assign username = "Coder42"; then print again.' };
        return { ok:true, out:'Anonymous\nCoder42' };
      }
    }
  ]
},

{

<div class="block">
  <div class="block-label concept-lbl">Concept</div>
  <div class="concept-text">
    <strong>Records</strong> (C# 9+) are immutable, value-based reference types. Perfect for data objects. They auto-generate <code>Equals</code>, <code>ToString</code>, and more. Use <code>with</code> to create a modified copy.
  </div>
</div>
<div class="block">
  <div class="block-label syntax-lbl">Example</div>
  <div class="code-example">

    <pre><span class="kw">record</span> <span class="tp">Point</span>(<span class="tp">int</span> <span class="vr">X</span>, <span class="tp">int</span> <span class="vr">Y</span>);

<span class="kw">var</span> <span class="vr">p1</span> <span class="op">=</span> <span class="kw">new</span> <span class="tp">Point</span>(<span class="num">1</span>, <span class="num">2</span>);
<span class="kw">var</span> <span class="vr">p2</span> <span class="op">=</span> p1 <span class="kw">with</span> { Y <span class="op">=</span> <span class="num">10</span> };
Console<span class="op">.</span><span class="fn">WriteLine</span>(p1);  <span class="cmt">// Point { X = 1, Y = 2 }</span>
Console<span class="op">.</span><span class="fn">WriteLine</span>(p2);  <span class="cmt">// Point { X = 1, Y = 10 }</span>
Console<span class="op">.</span><span class="fn">WriteLine</span>(p1 <span class="op">==</span> p2); <span class="cmt">// False</span></pre>

<div class="block">

    {

      step:'STEP 2', xp:145,
      question:`
<div class="block">

// ═══════════════════════════════════════════════════════════
//   STATE
// ═══════════════════════════════════════════════════════════
const S = {
  ch: 0, step: 0,
  xp: 0, streak: 0,
  done: new Set(),
  chDone: new Set(),
  hinted: false
};

// ═══════════════════════════════════════════════════════════
//   BOOT
// ═══════════════════════════════════════════════════════════
function boot() {
  buildRail();
  loadLesson();
  refreshHud();
}

function buildRail() {
  const rail = document.getElementById('rail');
  rail.innerHTML = '';
  curriculum.forEach((ch, i) => {
    const t = document.createElement('div');
    const locked = !unlocked(i);
    t.className = 'ch-tab' +
      (i === S.ch ? ' active' : '') +
      (S.chDone.has(i) ? ' done' : '') +
      (locked ? ' locked' : '');
    t.innerHTML = `<span class="ch-icon">${ch.icon}</span>${ch.name}<span class="ch-num">${ch.steps.length}</span>`;
    if (!locked) {
      t.onclick = () => { S.ch = i; S.step = 0; buildRail(); loadLesson(); };
    }
    rail.appendChild(t);
  });
}

function unlocked(i) {
  return i === 0 || S.chDone.has(i - 1) || S.ch === i;
}

function loadLesson() {
  const ch   = curriculum[S.ch];
  const step = ch.steps[S.step];

  document.getElementById('hdr-chapter').textContent = ch.name;
  document.getElementById('hdr-steps').textContent   = `${S.step + 1} / ${ch.steps.length}`;
  document.getElementById('b-step').textContent  = step.step;
  document.getElementById('b-topic').textContent = ch.topic;
  document.getElementById('l-title').textContent = step.title;
  document.getElementById('l-body').innerHTML    = step.question;
  document.getElementById('editor').value        = step.starter;
  document.getElementById('console').innerHTML   = '<span class="c-dim">// Write your code and click Compile & Check...</span>';
  document.getElementById('o-dot').className     = 'out-dot';

  const pct = (S.step / ch.steps.length) * 100;
  document.getElementById('prog-fill').style.width = pct + '%';

  syncLines();
}

function refreshHud() {
  document.getElementById('h-xp').textContent  = S.xp;
  document.getElementById('h-str').textContent = S.streak;
  document.getElementById('h-lv').textContent  = Math.floor(S.xp / 300) + 1;
}

// ═══════════════════════════════════════════════════════════
//   EDITOR
// ═══════════════════════════════════════════════════════════
function tabHandle(e) {
  if (e.key === 'Tab') {
    e.preventDefault();
    const t = e.target, s = t.selectionStart, end = t.selectionEnd;
    t.value = t.value.slice(0, s) + '    ' + t.value.slice(end);
    t.selectionStart = t.selectionEnd = s + 4;
    syncLines();
  }
  if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
    e.preventDefault();
    runCheck();
  }
}

function syncLines() {
  const ta = document.getElementById('editor');
  const n  = ta.value.split('\n').length;
  document.getElementById('lines').textContent = Array.from({length:n},(_,i)=>i+1).join('\n');
  ta.onscroll = () => { document.getElementById('lines').scrollTop = ta.scrollTop; };
}

function resetCode() {
  document.getElementById('editor').value = curriculum[S.ch].steps[S.step].starter;
  document.getElementById('console').innerHTML = '<span class="c-dim">// Reset. Try again!</span>';
  document.getElementById('o-dot').className = 'out-dot';
  syncLines();
}

function toggleHint(btn) {
  const box = btn.nextElementSibling;
  box.classList.toggle('open');
  btn.textContent = box.classList.contains('open') ? '🙈 Hide Hint' : '💡 Hint';
  S.hinted = true;
}

// ═══════════════════════════════════════════════════════════
//   RUN & CHECK
// ═══════════════════════════════════════════════════════════
function runCheck() {
  const code = document.getElementById('editor').value;
  const step = curriculum[S.ch].steps[S.step];
  const dot  = document.getElementById('o-dot');
  const con  = document.getElementById('console');

  dot.className = 'out-dot running';
  con.innerHTML = '<span class="c-info">// Compiling...</span>';

  setTimeout(() => {
    const r = step.check(code);
    if (r.ok) {
      dot.className = 'out-dot ok';
      con.innerHTML = `<span class="c-ok">✓ Success!\n\n${r.out || ''}</span>`;

      const key = `${S.ch}-${S.step}`;
      if (!S.done.has(key)) {
        const earned = S.hinted ? Math.floor(step.xp * 0.65) : step.xp;
        S.xp += earned;
        S.streak++;
        S.done.add(key);
        refreshHud();
        showModal(true, r.out, earned);
        spawnSparks();
      } else {
        showModal(true, r.out, 0);
      }
    } else {
      dot.className = 'out-dot err';
      con.innerHTML = `<span class="c-err">✗ Build failed\n\n${r.msg}</span>`;
      S.streak = 0;
      refreshHud();
      shakePane();
    }
    S.hinted = false;
  }, 600);
}

function shakePane() {
  const p = document.querySelector('.editor-pane');
  ['-8px','8px','-5px','5px','0'].forEach((x, i) => {
    setTimeout(() => p.style.transform = `translateX(${x})`, i * 70);
  });
}

// ═══════════════════════════════════════════════════════════
//   MODAL
// ═══════════════════════════════════════════════════════════
const glyphs   = ['🎯','🏆','⚡','🔥','💎','🚀','✨','🎖️'];
const msgs_ok  = [
  'Compiled and correct!',
  'You\'re thinking in C#.',
  'Clean code. Keep shipping.',
  'That\'s exactly right.',
  'Nailing it — one concept at a time.',
  'The compiler is proud of you.'
];

function showModal(ok, out, earned) {
  const ch   = curriculum[S.ch];
  const isLast = S.step === ch.steps.length - 1;
  const allDone = S.ch === curriculum.length - 1 && isLast;

  document.getElementById('m-glyph').textContent = glyphs[Math.floor(Math.random() * glyphs.length)];
  const hd = document.getElementById('m-head');
  hd.textContent  = isLast ? (allDone ? '🏅 COMPLETE!' : `${ch.name} Mastered!`) : 'Build Passed!';
  hd.className    = 'modal-heading ok';
  document.getElementById('m-sub').textContent = allDone
    ? 'You completed all 15 chapters of C# Forge. You\'re a C# engineer!'
    : isLast
      ? `${ch.name} chapter complete. Next chapter unlocked!`
      : msgs_ok[Math.floor(Math.random() * msgs_ok.length)];

  const xpEl = document.getElementById('m-xp');
  xpEl.textContent = earned > 0 ? `+${earned} XP` : 'Already earned!';
  xpEl.style.opacity = earned > 0 ? '1' : '0.4';

  document.getElementById('modal').classList.add('open');
}

function advance() {
  document.getElementById('modal').classList.remove('open');
  const ch = curriculum[S.ch];
  if (S.step < ch.steps.length - 1) {
    S.step++;
  } else {
    S.chDone.add(S.ch);
    if (S.ch < curriculum.length - 1) {
      S.ch++;
      S.step = 0;
    }
    buildRail();
  }
  loadLesson();
}

// ═══════════════════════════════════════════════════════════
//   SPARKS
// ═══════════════════════════════════════════════════════════
function spawnSparks() {
  const palette = ['#9b59ff','#22d3a8','#ff8c42','#ffd700','#38bdf8','#ff4081'];
  const cx = window.innerWidth / 2, cy = window.innerHeight / 2;
  for (let i = 0; i < 28; i++) {
    const sp = document.createElement('div');
    sp.className = 'spark';
    const ang  = (i / 28) * Math.PI * 2;
    const dist = 80 + Math.random() * 140;
    sp.style.cssText = `left:${cx}px;top:${cy}px;background:${palette[i%palette.length]};--dx:${Math.cos(ang)*dist}px;--dy:${Math.sin(ang)*dist}px;animation-duration:${0.7+Math.random()*0.4}s`;
    document.body.appendChild(sp);
    setTimeout(() => sp.remove(), 1200);
  }
}

// ═══════════════════════════════════════════════════════════
//   KEYBOARD
// ═══════════════════════════════════════════════════════════
document.addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') runCheck();
});

boot();
</script>
